<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card shadow p-4" style="max-width: 500px;">
        <h2 class="mb-4 text-center">Register New Student</h2>
        
        <form action="UserServlet" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="action" value="register">
            
            <div class="mb-3">
                <label class="form-label">Matric No:</label>
                <input type="text" name="matricNo" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Full Name:</label>
                <input type="text" name="fullname" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password:</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Profile Picture:</label>
                <input type="file" name="profileImage" class="form-control" accept="image/*" required>
            </div>
            
            <div class="d-flex gap-2">
                <input type="submit" value="Register" class="btn btn-success w-50">
                <a href="login.html" class="btn btn-secondary w-50">Back to Login</a>
            </div>
        </form>
    </div>
</body>
</html>
